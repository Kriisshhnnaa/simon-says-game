<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon says</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Simon Says</h1>
    <h2>Press any key to start</h2>
    <div class="outer">
        <div class="inner1">
            <div class="btn green" id="green">1</div>
            <div class="btn blue" id="blue">2</div>
        </div>
        <div class="inner2">
            <div class="btn red" id="red">3</div>
            <div class="btn yellow" id="yellow">4</div>
        </div>
    </div>


    <script src="app.js"></script>
    
</body>
</html>
